name: google_apis_flutter
description: "Production-grade Flutter integration with Google Workspace APIs. Calendar, Drive, Sheets, Gmail (send-only), Contacts, Maps, Meet."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Models & functional types
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  dartz: ^0.10.1
  equatable: ^2.0.5

  # --- Auth & Google APIs
  google_sign_in: ^6.2.2
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  local_auth_android: ^1.0.46
  local_auth_darwin: ^1.4.1

  # --- Storage / cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # --- Network
  dio: ^5.7.0
  retry: ^3.1.2
  connectivity_plus: ^6.0.5
  http: ^1.2.2

  # --- UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_local_notifications: ^17.2.3
  url_launcher: ^6.3.1
  intl: ^0.19.0

  # --- Files & pickers
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  share_plus: ^10.0.2

  # --- Logging
  logger: ^2.4.0

  # --- Routing
  go_router: ^14.2.7

  # --- Calendar UI
  table_calendar: ^3.1.2

  # --- Maps
  google_maps_flutter: ^2.9.0
  geocoding: ^3.0.0

  # --- Charts (for SheetsOps vertical)
  fl_chart: ^0.69.0

  # --- Misc
  uuid: ^4.5.1
  collection: ^1.18.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # --- Linting
  flutter_lints: ^5.0.0
  custom_lint: ^0.6.7
  riverpod_lint: ^2.6.3

  # --- Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3

  # --- Testing
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0
  network_image_mock: ^2.1.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/branding/
