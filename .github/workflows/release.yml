name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        flavor: [base, bizcalendar, drivevault, sheetsops, meetcompanion]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.3'
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK + AAB
        run: |
          flutter build apk --release \
            --dart-define=FLAVOR=${{ matrix.flavor }} \
            --split-per-abi
          flutter build appbundle --release \
            --dart-define=FLAVOR=${{ matrix.flavor }}

      - name: Stage artifacts
        run: |
          mkdir -p staging
          cp build/app/outputs/flutter-apk/*.apk staging/ || true
          cp build/app/outputs/bundle/release/*.aab staging/ || true
          # rename to include flavor
          for f in staging/*; do
            mv "$f" "${f%/*}/$(basename "$f" | sed 's/^/${{ matrix.flavor }}-/')"
          done
          ls -la staging/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: staging/*
          fail_on_unmatched_files: false
          draft: false
          generate_release_notes: true
