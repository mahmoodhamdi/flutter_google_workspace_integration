name: Build

on:
  push:
    branches: [main, "sales-prep/**"]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    name: Android (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        flavor: [base, bizcalendar, drivevault, sheetsops, meetcompanion]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.5'
          cache: true

      - name: Install deps
        run: flutter pub get

      - name: Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=FLAVOR=${{ matrix.flavor }} \
            --split-per-abi \
            --no-tree-shake-icons

      - name: Build AAB
        run: |
          flutter build appbundle --release \
            --dart-define=FLAVOR=${{ matrix.flavor }}

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.flavor }}-android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 14
          if-no-files-found: warn

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true   # web requires per-flavor config + JS interop for several plugins; not blocking
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.5'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Build web (base)
        run: flutter build web --release --dart-define=FLAVOR=base || echo "Web build needs platform-specific config; not blocking PR"
      - uses: actions/upload-artifact@v4
        with:
          name: base-web
          path: build/web/
          retention-days: 14

  ios:
    runs-on: macos-14
    timeout-minutes: 35
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.5'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --dart-define=FLAVOR=base
      - uses: actions/upload-artifact@v4
        with:
          name: base-ios
          path: build/ios/iphoneos/Runner.app
          retention-days: 14
